name: Deploy API Mascotas

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar en la VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            # Ir al directorio de la app (o clonar si es la primera vez)
            if [ ! -d "/home/${{ secrets.VM_USER }}/api-mascotas" ]; then
              cd /home/${{ secrets.VM_USER }}
              git clone ${{ secrets.REPO_URL }} api-mascotas
            fi

            cd /home/${{ secrets.VM_USER }}/api-mascotas

            # Traer los últimos cambios
            git pull origin main

            # Instalar dependencias
            npm install --production

            # Instalar PM2 si no está
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
            fi

            # Reiniciar o iniciar la app
            pm2 restart ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production

            # Guardar el proceso para que sobreviva reinicios
            pm2 save
