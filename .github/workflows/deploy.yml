name: Deploy API Mascotas

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Desplegar en la VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            NOMBRE_APP="${{ github.event.repository.name }}"
            RUTA_APP="$HOME/$NOMBRE_APP"

            # Clonar si es la primera vez, o hacer pull
            if [ ! -d "$RUTA_APP" ]; then
              git clone https://github.com/${{ github.repository }}.git "$RUTA_APP"
            else
              cd "$RUTA_APP"
              git pull origin main
            fi

            cd "$RUTA_APP"

            # Instalar dependencias
            npm install --production

            # Crear .env si no existe
            if [ ! -f .env ]; then
              echo "⚠️ No se encontró .env — crea uno manualmente en $RUTA_APP/.env"
              exit 1
            fi

            # Reiniciar o iniciar con PM2
            pm2 describe "$NOMBRE_APP" > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart "$NOMBRE_APP"
            else
              pm2 start index.js --name "$NOMBRE_APP"
            fi

            pm2 save
            echo "✅ $NOMBRE_APP desplegado correctamente"
